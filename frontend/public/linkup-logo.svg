<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Glowing filters -->
    <filter id="purple-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur1" />
      <feGaussianBlur stdDeviation="1.5" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="blue-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur1" />
      <feGaussianBlur stdDeviation="1.5" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Metallic/Glow gradients for connections -->
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <linearGradient id="mix-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>

    <!-- Spherical gradients for nodes -->
    <radialGradient id="node-purple" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f5d0fe" />
      <stop offset="30%" stop-color="#d946ef" />
      <stop offset="70%" stop-color="#701a75" />
      <stop offset="100%" stop-color="#1e0c24" />
    </radialGradient>

    <radialGradient id="node-blue" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#cffafe" />
      <stop offset="30%" stop-color="#06b6d4" />
      <stop offset="70%" stop-color="#0891b2" />
      <stop offset="100%" stop-color="#0c232e" />
    </radialGradient>
  </defs>

  <!-- Network Connections (Lines) -->
  <!-- Back/glowing paths -->
  <path d="M 50 18 Q 23 35 23 44" stroke="url(#blue-grad)" stroke-width="4.5" stroke-linecap="round" opacity="0.85" filter="url(#blue-glow)" />
  <path d="M 23 44 Q 18 68 28 72" stroke="url(#blue-grad)" stroke-width="4.5" stroke-linecap="round" opacity="0.85" filter="url(#blue-glow)" />
  <path d="M 28 72 Q 52 75 52 75" stroke="url(#mix-grad)" stroke-width="4.5" stroke-linecap="round" opacity="0.85" filter="url(#blue-glow)" />
  <path d="M 52 75 Q 77 72 77 48" stroke="url(#purple-grad)" stroke-width="4.5" stroke-linecap="round" opacity="0.85" filter="url(#purple-glow)" />
  <path d="M 77 48 Q 77 22 50 18" stroke="url(#purple-grad)" stroke-width="4.5" stroke-linecap="round" opacity="0.85" filter="url(#purple-glow)" />
  
  <!-- Intersecting connecting fibers -->
  <path d="M 50 18 Q 38 45 28 72" stroke="url(#mix-grad)" stroke-width="3" stroke-linecap="round" opacity="0.75" />
  <path d="M 23 44 Q 50 48 77 48" stroke="url(#mix-grad)" stroke-width="3.5" stroke-linecap="round" opacity="0.75" />
  <path d="M 50 18 Q 63 50 52 75" stroke="url(#purple-grad)" stroke-width="3" stroke-linecap="round" opacity="0.7" />
  <path d="M 23 44 Q 38 60 52 75" stroke="url(#blue-grad)" stroke-width="3" stroke-linecap="round" opacity="0.7" />

  <!-- Network Nodes (Circles) -->
  <!-- Top Node -->
  <circle cx="50" cy="18" r="9" fill="url(#node-purple)" stroke="#d946ef" stroke-width="1.5" filter="url(#purple-glow)" />
  <!-- Middle Left Node -->
  <circle cx="23" cy="44" r="8" fill="url(#node-blue)" stroke="#06b6d4" stroke-width="1.5" filter="url(#blue-glow)" />
  <!-- Bottom Left Node -->
  <circle cx="28" cy="72" r="9" fill="url(#node-blue)" stroke="#06b6d4" stroke-width="1.5" filter="url(#blue-glow)" />
  <!-- Bottom Right Node -->
  <circle cx="52" cy="75" r="9" fill="url(#node-purple)" stroke="#d946ef" stroke-width="1.5" filter="url(#purple-glow)" />
  <!-- Middle Right Node -->
  <circle cx="77" cy="48" r="8" fill="url(#node-purple)" stroke="#d946ef" stroke-width="1.5" filter="url(#purple-glow)" />
</svg>
