<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 50" fill="none">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ea;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#00bcd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00bcd4;stop-opacity:1" />
    </linearGradient>
    <filter id="g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Left loop of infinity -->
  <path
    d="M 14 25 C 14 14, 26 8, 32 16 C 36 21, 38 25, 40 25 C 38 25, 36 29, 32 34 C 26 42, 14 38, 14 25 Z"
    stroke="url(#tealGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"
    fill="none" filter="url(#g)" />

  <!-- Right loop of infinity -->
  <path
    d="M 66 25 C 66 14, 54 8, 48 16 C 44 21, 42 25, 40 25 C 42 25, 44 29, 48 34 C 54 42, 66 38, 66 25 Z"
    stroke="url(#purpleGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"
    fill="none" filter="url(#g)" />

  <!-- Crossing accent lines through center -->
  <path d="M 32 17 C 35 20, 38 23, 40 25" stroke="#00d4ea" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M 48 17 C 45 20, 42 23, 40 25" stroke="#a855f7" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M 32 33 C 35 30, 38 27, 40 25" stroke="#00bcd4" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M 48 33 C 45 30, 42 27, 40 25" stroke="#a855f7" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.85"/>

  <!-- Arrow tips -->
  <polygon points="19,10 13,14 18,18" fill="#00d4ea" opacity="0.95"/>
  <polygon points="61,40 67,36 62,32" fill="#a855f7" opacity="0.95"/>
</svg>
